<div class="login-container">
    <div class="login-content">
        <h2 class="text-center">Welcome to the Ticketing System</h2>
    <p class="text-center">Please login to access your tickets and manage your account.</p>
    </div>
    
    <mat-card>
    <mat-card-header>
        <mat-card-title>Login</mat-card-title>
    </mat-card-header>
    <mat-card-content class="form-content">
        <form>
            <mat-form-field appearance="fill" class="full-width">
                <mat-label>Username</mat-label>
                <input matInput placeholder="Enter your username" required formControlName="userName">
                @if(userNameCtrl.hasError('required')) {
                <mat-error>
                    Username is required
                </mat-error>
                }
            </mat-form-field>
            <mat-form-field appearance="fill" class="full-width">
                <mat-label>Password</mat-label>
                <input matInput type="password" placeholder="Enter your password" required formControlName="password">
                @if(passwordCtrl.hasError('required')) {
                <mat-error>
                    Password is required
                </mat-error>
                }
            </mat-form-field>
            <br>
            <button mat-raised-button color="primary" (click)="formSubmit()" class="full-width">Login</button>

        </form>

    </mat-card-content>
</mat-card>
</div>
